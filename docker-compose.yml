services:
  longear-diaries:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: longear-diaries
    environment:
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_ENV: production
      PORT: "3000"
    ports:
      - "3000:3000"
    restart: unless-stopped
